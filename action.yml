name: TrustPack Action
description: Generate a buyer-ready security due diligence pack from your GitHub repository.
author: QuantumNavigator42

branding:
  icon: shield
  color: blue

inputs:
  github-token:
    description: GitHub token used for repository evidence collection.
    required: false
    default: "${{ github.token }}"
  output-dir:
    description: Directory where TrustPack reports will be written.
    required: false
    default: trustpack
  company-name:
    description: Company name to include in generated reports.
    required: false
    default: Your company
  product-name:
    description: Product name to include in generated reports.
    required: false
    default: Your product
  include-html:
    description: Whether to generate an HTML index page.
    required: false
    default: "true"
  fail-on-high-risk-workflows:
    description: Whether to fail the Action after reports are written when high-risk workflow findings are present.
    required: false
    default: "false"

runs:
  using: node24
  main: dist/index.js
